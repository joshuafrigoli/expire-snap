<script>
        // Update styling based on date changes with the "cartoony" design system colors
        document.querySelectorAll('input[type="date"]').forEach(picker => {
            picker.addEventListener('change', (e) => {
                const card = e.target.closest('.rounded-3xl');
                const badge = card.querySelector('.rounded-full.uppercase');
                const today = new Date();
                const expiry = new Date(e.target.value);
                const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));

                if (diffDays < 3) {
                    badge.className = "px-4 py-1.5 bg-error-container text-error border-2 border-on-surface rounded-full font-label-lg text-xs uppercase tracking-tight";
                    badge.textContent = "Critical";
                } else if (diffDays < 7) {
                    badge.className = "px-4 py-1.5 bg-secondary-container text-on-secondary-container border-2 border-on-surface rounded-full font-label-lg text-xs uppercase tracking-tight";
                    badge.textContent = "Soon";
                } else {
                    badge.className = "px-4 py-1.5 bg-primary-container text-on-primary-container border-2 border-on-surface rounded-full font-label-lg text-xs uppercase tracking-tight";
                    badge.textContent = "Fresh";
                }
            });
        });

        // Delete interaction with bouncy animation
        document.querySelectorAll('button.text-error').forEach(btn => {
            btn.addEventListener('click', function() {
                const card = this.closest('.rounded-3xl');
                card.style.transform = 'scale(0.8) rotate(-5deg)';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.remove();
                }, 300);
            });
        });
    </script>
